name: CI

on:
  push:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi pydantic uvicorn pytest httpx ruff

      - name: Syntax check
        run: python -m py_compile main.py

      - name: Import app
        run: python -c "import main; print('imported OK')"

      - name: Run tests
        run: pytest -v test_main.py

      - name: Lint with Ruff
        run: ruff check .